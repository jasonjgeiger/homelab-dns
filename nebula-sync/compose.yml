services:
  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    container_name: nebula-sync
    environment:
      PRIMARY: ${PRIMARY}
      REPLICAS: ${REPLICAS}
      FULL_SYNC: ${FULL_SYNC:-true}
      RUN_GRAVITY: ${RUN_GRAVITY:-true}
      CRON: "${CRON:-*/15 * * * *}"
      TZ: ${TZ:-America/Los_Angeles}
    restart: unless-stopped
