services:
  keepalived:
    container_name: keepalived
    image: osixia/keepalived:2.0.20
    network_mode: service:pihole
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
      - NET_RAW
    privileged: true
    volumes:
      # Relative to this compose file (include path resolution).
      - ./keepalived.conf:/container/service/keepalived/assets/keepalived.conf:ro
    restart: unless-stopped
