# HA DNS stack — Docker Compose 2.24+ `include` with per-fragment `.env` files.
# From repo root (required for bind-mount paths):
#   docker compose --project-directory . up -d
#
# First time: copy each `.env.example` to `.env` in `macvlan/`, `dnscrypt-proxy/`,
# `pihole/`, and `keepalived/`, then render `keepalived/keepalived.conf` (see README).
name: pihole

include:
  - path: macvlan/compose.yml
    env_file:
      - macvlan/.env
  - path: dnscrypt-proxy/compose.yml
    env_file:
      - dnscrypt-proxy/.env
  - path: pihole/compose.yml
    env_file:
      - pihole/.env
  - path: keepalived/compose.yml
