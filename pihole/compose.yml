networks:
  # pihole_macvlan is defined in ../macvlan/compose.yml (root compose include).
  # Duplicates dnscrypt-proxy/compose.yml; merge collapses to one network.
  pihole_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    depends_on:
      - dnscrypt-proxy
    networks:
      pihole_macvlan:
        ipv4_address: ${PIHOLE_IPV4}
      pihole_internal:
        ipv4_address: 10.0.1.3
    cap_add:
      - NET_ADMIN
    environment:
      - FTLCONF_LOCAL_IPV4=${SERVERIP}
      - FTLCONF_webserver_api_password=${WEBPASSWORD}
      - TZ=${TZ}
      - DNS1=${DNS1}
      - DNS2=${DNS2}
      - DNSMASQ_LISTENING=all
    volumes:
      - ./dns-setup/pihole:/etc/pihole
      - ./dns-setup/dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "google.com", "+short"]
      interval: 30s
      timeout: 10s
      retries: 3
