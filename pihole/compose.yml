networks:
  # Vars from pihole/.env (PARENT_INTERFACE, MACVLAN_*). Defined here (not a separate compose file)
  # so pihole_macvlan is always in the merged project.
  pihole_macvlan:
    driver: macvlan
    driver_opts:
      parent: ${PARENT_INTERFACE}
    ipam:
      config:
        - subnet: ${MACVLAN_SUBNET}
          gateway: ${MACVLAN_GATEWAY}
  pihole_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24

services:
  dnscrypt-proxy:
    container_name: dnscrypt-proxy
    image: klutchell/dnscrypt-proxy:latest
    networks:
      pihole_internal:
        ipv4_address: 10.0.1.2
    expose:
      - "5300/tcp"
      - "5300/udp"
    environment:
      TZ: ${TZ}
    volumes:
      - ./dnscrypt-proxy/etc-dnscrypt-proxy:/config
    dns:
      - 1.1.1.1
    restart: unless-stopped

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    depends_on:
      - dnscrypt-proxy
    networks:
      pihole_macvlan:
        ipv4_address: ${PIHOLE_IPV4}
      pihole_internal:
        ipv4_address: 10.0.1.3
    cap_add:
      - NET_ADMIN
    environment:
      - FTLCONF_LOCAL_IPV4=${SERVERIP}
      - FTLCONF_webserver_api_password=${WEBPASSWORD}
      - TZ=${TZ}
      - DNS1=${DNS1}
      - DNS2=${DNS2}
      - DNSMASQ_LISTENING=all
    volumes:
      # Relative to stack.sh --project-directory (repo root); see README.
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "google.com", "+short"]
      interval: 30s
      timeout: 10s
      retries: 3

  keepalived:
    container_name: keepalived
    image: osixia/keepalived:2.0.20
    depends_on:
      - pihole
    network_mode: service:pihole
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
      - NET_RAW
    privileged: true
    volumes:
      - ./keepalived/keepalived.conf:/container/service/keepalived/assets/keepalived.conf:ro
    restart: unless-stopped
