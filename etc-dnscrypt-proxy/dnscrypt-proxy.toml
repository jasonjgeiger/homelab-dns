# Minimal dnscrypt-proxy config; mounted by ./compose.yml in this directory (listens on :5300).
# Edit server_names, sources, or filters to match https://dnscrypt.info/doc

server_names = ['cloudflare']

listen_addresses = ['0.0.0.0:5300']

max_clients = 250

ipv4_servers = true
ipv6_servers = false
dnscrypt_servers = true
doh_servers = true

require_dnssec = false

# Minisign key must match DNSCrypt/dnscrypt-resolvers v3 (see example-dnscrypt-proxy.toml upstream).
[sources]
  [sources.'public-resolvers']
  urls = [
    'https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md',
    'https://download.dnscrypt.info/resolvers-list/v3/public-resolvers.md',
  ]
  cache_file = 'public-resolvers.md'
  minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
  refresh_delay = 72
  prefix = ''
